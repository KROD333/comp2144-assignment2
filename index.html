<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 2 | VR Public Speaking Exposure</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        /* Pre-session panel (assignment UI on top of the canvas) */
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            pointer-events: none;
            background: rgba(2, 4, 10, 0.55);
            font-family: system-ui, sans-serif;
            color: #f5f5f5;
        }
        #preSession {
            pointer-events: auto;
            max-width: 360px;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 6px;
            text-align: left;
        }
        #preSession label {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        #preSession select,
        #preSession button {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.4rem;
            box-sizing: border-box;
        }
        #sessionHud {
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.35rem 0.5rem;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            display: none;
            pointer-events: none;
            font-family: system-ui, sans-serif;
            text-align: right;
            line-height: 1.35;
        }
        body.session-started #overlay {
            display: none;
        }
        body.session-started #sessionHud {
            display: block;
        }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>
    <script src="js/stage-scene.js" defer></script>
</head>
<body>
    <canvas id="renderCanvas" touch-action="none"></canvas>
    <!-- touch-action="none" for best results from PEP -->
    <div id="sessionHud" aria-live="polite">
        <div id="sessionTimerLabel">Session: 0:00</div>
        <div id="headMovementLabel">Head movement: —</div>
        <div>Enter VR when ready.</div>
    </div>
    <div id="overlay">
        <h1>VR Exposure Stage</h1>
        <p>Pick audience size and difficulty, then continue.</p>
        <form id="preSession" action="index.html" method="get">
            <input type="hidden" name="started" value="1" />
            <label for="rows">Audience rows</label>
            <select id="rows" name="rows">
                <option value="1">1 row</option>
                <option value="2" selected>2 rows</option>
                <option value="3">3 rows</option>
            </select>
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" name="difficulty">
                <option value="calm">Calm</option>
                <option value="moderate" selected>Moderate</option>
                <option value="challenging">Challenging</option>
            </select>
            <button type="submit">Continue to scene</button>
        </form>
        <p style="margin-top:0.75rem;font-size:0.85rem;opacity:0.85;">Then open in a VR-capable browser and use Enter VR.</p>
    </div>
    <script>
        (function () {
            var p = new URLSearchParams(window.location.search);
            if (p.get("started") === "1") {
                document.body.classList.add("session-started");
                return;
            }
            var rows = p.get("rows");
            var diff = p.get("difficulty");
            var rowsEl = document.getElementById("rows");
            var diffEl = document.getElementById("difficulty");
            if (rows && rowsEl && "123".indexOf(rows) !== -1) rowsEl.value = rows;
            if (diff && diffEl && ["calm", "moderate", "challenging"].indexOf(diff) !== -1)
                diffEl.value = diff;
        })();
    </script>
</body>
</html>
